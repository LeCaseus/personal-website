<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>my notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">

</head>
<body>

<header>
  <div class="logo" onclick="showFeed(null)">a<em>note</em></div>
  <div class="header-right">
    <div class="header-filters">
      <div class="filter-pill active" onclick="showFeed(null,this)">All</div>
      <div class="filter-pill" onclick="showFeed('note',this)">Notes</div>
      <div class="filter-pill" onclick="showFeed('letter',this)">Letters</div>
      <div class="filter-pill" onclick="showFeed('thought',this)">Thoughts</div>
    </div>
    <button class="write-btn" onclick="showCompose()">+ Write</button>
  </div>
</header>

<div class="page-wrap" id="page"></div>
<div class="toast" id="toast"></div>

<script src="script.js"></script>

</body>
</html>
