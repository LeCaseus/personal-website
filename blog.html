<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog — Chezter Vargas</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>

  <style>
    /* ── BLOG-SPECIFIC VARIABLES ── */
    :root {
      --personal:   #b8605a;
      --gaming:     #5a6e8a;
      --career:     #4a7a5c;
      --personal-l: rgba(184,96,90,0.08);
      --gaming-l:   rgba(90,110,138,0.08);
      --career-l:   rgba(74,122,92,0.08);
    }

    /* ── PAGE WRAP ── */
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 clamp(1.5rem, 5vw, 3rem);
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 6rem 0 3rem;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 3rem;
    }

    .page-header-inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .page-eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 0.6rem;
    }

    .page-heading {
      font-family: 'Fraunces', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .page-heading em { font-style: italic; color: var(--accent); }

    .page-sub {
      font-size: 0.92rem;
      color: var(--ink2);
      margin-top: 0.5rem;
      font-style: italic;
    }

    /* ── BLOG CATEGORY PILLS ── */
    .fpill-personal.active { background: var(--personal); border-color: var(--personal); }
    .fpill-gaming.active   { background: var(--gaming);   border-color: var(--gaming); }
    .fpill-career.active   { background: var(--career);   border-color: var(--career); }

    /* ── FEATURED POST ── */
    .featured {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background: var(--paper);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 3rem;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.2s;
      animation: rise 0.4s ease both;
    }
    @keyframes rise { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .featured:hover { box-shadow: 0 16px 48px rgba(42,33,24,0.12); transform: translateY(-2px); }

    .featured-image {
      background: var(--warm);
      min-height: 340px;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem;
      position: relative;
      overflow: hidden;
    }
    .featured-image img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      position: absolute; inset: 0;
    }

    .featured-body {
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .featured-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 0.75rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .featured-label::before { content: ''; display: block; width: 20px; height: 1px; background: var(--accent); }

    .featured-title {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      font-weight: 300;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      color: var(--ink);
    }

    .featured-excerpt {
      font-size: 0.92rem;
      color: var(--ink2);
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .post-meta {
      display: flex; align-items: center; gap: 0.75rem;
      font-size: 0.72rem; color: var(--faint);
      flex-wrap: wrap;
    }
    .post-meta-dot { width: 3px; height: 3px; background: var(--faint); border-radius: 50%; }

    .cat-tag {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
    }
    .cat-personal { background: var(--personal-l); color: var(--personal); }
    .cat-gaming   { background: var(--gaming-l);   color: var(--gaming); }
    .cat-career   { background: var(--career-l);   color: var(--career); }

    /* ── GRID ── */
    .section-label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--faint);
      font-weight: 500;
      margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--rule); }

    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 4rem;
    }

    .post-card {
      background: var(--paper);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.18s, transform 0.18s;
      animation: rise 0.4s ease both;
    }
    .post-card:hover { box-shadow: 0 10px 32px rgba(42,33,24,0.1); transform: translateY(-3px); }

    .post-card-image {
      background: var(--warm);
      aspect-ratio: 16/9;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      position: relative; overflow: hidden;
    }
    .post-card-image img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    .post-card-body { padding: 1.35rem 1.4rem 1.5rem; }

    .post-card-title {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      font-weight: 300;
      line-height: 1.3;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .post-card-excerpt {
      font-size: 0.85rem;
      color: var(--ink2);
      line-height: 1.65;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── SINGLE POST ── */
    .single-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 6rem clamp(1.5rem, 5vw, 2rem) 5rem;
      animation: rise 0.35s ease both;
    }

    .single-cover {
      width: 100%;
      aspect-ratio: 16/7;
      background: var(--warm);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 2.5rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
      position: relative;
    }
    .single-cover img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    .single-title {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      font-weight: 300; line-height: 1.15;
      letter-spacing: -0.02em; margin-bottom: 1rem;
    }

    .single-body {
      font-size: 1.05rem;
      line-height: 1.9;
      color: var(--ink2);
      font-weight: 300;
    }
    .single-body p { margin-bottom: 1.4rem; }
    .single-body h2 { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 300; margin: 2rem 0 0.75rem; color: var(--ink); }

    /* ── COMPOSE ── */
    .compose-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 6rem clamp(1.5rem, 5vw, 2rem) 5rem;
      animation: rise 0.3s ease both;
    }
    .compose-wrap h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.9rem; font-weight: 300;
      letter-spacing: -0.02em; margin-bottom: 0.3rem;
    }
    .compose-wrap .sub { font-size: 0.9rem; color: var(--faint); font-style: italic; margin-bottom: 2rem; }

    .cfield-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .cfield input, .cfield textarea, .cfield select {
      width: 100%; background: var(--paper);
      border: 1px solid var(--rule); border-radius: 6px;
      padding: 0.8rem 1rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      font-weight: 300; color: var(--ink); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .cfield input:focus, .cfield textarea:focus, .cfield select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(193,127,74,0.1);
    }
    .cfield textarea { min-height: 300px; resize: vertical; line-height: 1.75; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .featured { grid-template-columns: 1fr; }
      .featured-image { min-height: 220px; }
      .cfield-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">chezter<em>vargas</em></a>
    <div class="nav-links">
      <a href="index.html">home</a>
      <a href="blog.html" class="active">blog</a>
      <a href="resume.html">resume</a>
      <a class="nav-write" onclick="showCompose()">+ write</a>
    </div>
  </nav>

  <div class="wrap">
    <div class="page-header">
      <div class="page-header-inner">
        <div>
          <p class="page-eyebrow">writing & ideas</p>
          <h1 class="page-heading">The <em>Blog</em></h1>
          <p class="page-sub">Long reads on personal life, gaming, and career.</p>
        </div>
        <div class="filter-bar">
          <div class="fpill active" onclick="setFilter(null,this)">all</div>
          <div class="fpill fpill-personal" onclick="setFilter('personal',this)">personal</div>
          <div class="fpill fpill-gaming" onclick="setFilter('gaming',this)">gaming</div>
          <div class="fpill fpill-career" onclick="setFilter('career',this)">career</div>
        </div>
      </div>
    </div>

    <div id="page"></div>
  </div>

  <footer class="site-footer">
    <span id="copyright"></span>
    <div class="social-links-footer">
      <a href="https://www.youtube.com/@LeCaseus" target="_blank" class="social-footer-btn"><i class="fa-brands fa-youtube"></i></a>
      <a href="https://github.com/LeCaseus" target="_blank" class="social-footer-btn"><i class="fa-brands fa-github"></i></a>
      <a href="https://www.linkedin.com/in/lecaseus" target="_blank" class="social-footer-btn"><i class="fa-brands fa-linkedin"></i></a>
      <a href="https://www.instagram.com/cheeshire_/" target="_blank" class="social-footer-btn"><i class="fa-brands fa-instagram"></i></a>
    </div>
  </footer>

  <div class="toast" id="toast"></div>

<script src="blog.js"></script>
</body>
</html>
