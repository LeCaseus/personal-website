<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#2a2118"/>

  <!-- Italic C in Fraunces, accent color -->
  <text
    x="7"
    y="24"
    font-family="Fraunces, Georgia, serif"
    font-size="22"
    font-weight="400"
    font-style="italic"
    fill="#c17f4a"
    letter-spacing="-1"
  >c</text>

  <!-- Lowercase v, warm offwhite -->
  <text
    x="17"
    y="24"
    font-family="Fraunces, Georgia, serif"
    font-size="22"
    font-weight="300"
    font-style="italic"
    fill="#f5f0e8"
    letter-spacing="-1"
    opacity="0.9"
  >v</text>
</svg>
